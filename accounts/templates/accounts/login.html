{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4">
                <h3 class="text-center mb-4 text-coffee">Login to Your Account</h3>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-coffee w-100">Login</button>
                </form>
                <p class="mt-3 text-center">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
            </div>
        </div>
    </div>
</div>

<style>
    .text-coffee {
        color: #6f4e37;
    }
    .btn-coffee {
        background-color: #6f4e37;
        color: white;
    }
    .btn-coffee:hover {
        background-color: #5b3c2d;
    }
</style>
{% endblock %}
